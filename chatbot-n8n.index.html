<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda tu Cita</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font:    'Segoe UI', system-ui, sans-serif;
      --mono:    'SF Mono', 'Fira Code', monospace;
      --r:       16px;
      --surface: #0f0f0f;
      --surface2:#1a1a1a;
      --border:  rgba(255,255,255,0.08);
      --text:    #e8e8e8;
      --text2:   #a0a0a0;
      --text3:   #606060;
      --accent:  #22c55e;
      --accent-lt: rgba(34,197,94,0.07);
      --user-bg: #22c55e;
      --user-txt:#fff;
      --bot-bg:  #1e1e1e;
      --err:     #ef4444;
    }

    body {
      background: #080808;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: var(--font);
    }

    .chat-wrapper {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      height: min(680px, 90vh);
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    .avatar {
      width: 38px; height: 38px;
      background: var(--accent-lt);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 0; }
    .bot-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .bot-sub  { font-size: 11.5px; color: var(--text3); margin-top: 1px; }

    .progress-wrap { text-align: right; flex-shrink: 0; }
    .progress-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
    .progress-bar {
      width: 80px; height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; gap: 8px; align-items: flex-end; animation: fadeUp 0.25s ease; }
    .msg.user { flex-direction: row-reverse; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-av {
      width: 28px; height: 28px;
      background: var(--accent-lt);
      border: 1px solid rgba(34,197,94,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .bubble {
      max-width: 78%;
      font-size: 13.5px;
      line-height: 1.5;
      padding: 10px 14px;
      border-radius: var(--r);
    }
    .msg.bot  .bubble {
      background: var(--bot-bg);
      color: var(--text);
      border-radius: var(--r) var(--r) var(--r) 4px;
      border: 1px solid var(--border);
    }
    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-txt);
      border-radius: var(--r) var(--r) 4px var(--r);
    }
    .msg.error .bubble {
      background: rgba(239,68,68,0.1);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--r) var(--r) var(--r) 4px;
      font-size: 12.5px;
    }

    .options-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-left: 36px;
      animation: fadeUp 0.25s ease;
    }
    .opt-btn {
      background: var(--surface2);
      border: 1px solid rgba(34,197,94,0.25);
      color: var(--accent);
      font-size: 12.5px;
      font-family: var(--font);
      padding: 7px 13px;
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .opt-btn:hover { background: var(--accent-lt); transform: scale(1.03); }

    .typing { display: none; }
    .typing.active { display: flex; }
    .typing-dots {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-radius: var(--r) var(--r) var(--r) 4px;
      padding: 12px 16px;
      display: flex; gap: 4px; align-items: center;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--text3);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-5px); }
    }

    .summary-card {
      background: var(--accent-lt);
      border: 1.5px solid rgba(34,197,94,0.2);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 12.5px;
      line-height: 1.8;
      margin-left: 36px;
      animation: fadeUp 0.3s ease;
      color: var(--text);
    }
    .summary-card strong { color: var(--accent); font-weight: 600; }
    .summary-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
      display: block;
    }

    .chat-input {
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--surface);
    }
    .input-box {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13.5px;
      color: var(--text);
      font-family: var(--font);
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }
    .input-box:focus { border-color: rgba(34,197,94,0.4); }
    .input-box::placeholder { color: var(--text3); }
    .input-box:disabled { opacity: 0.35; cursor: not-allowed; }

    .input-native {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13.5px;
      color: var(--text);
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
      color-scheme: dark;
    }
    .input-native:focus { border-color: rgba(34,197,94,0.4); }
    .input-native:disabled { opacity: 0.35; cursor: not-allowed; }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.2s;
    }
    .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 17px; height: 17px; fill: var(--user-txt); }

    .horario-hint {
      font-size: 11px;
      color: var(--text3);
      margin-left: 36px;
      margin-top: -4px;
    }

    .page-footer {
      margin-top: 14px;
      font-size: 11px;
      color: #333;
      font-family: var(--mono);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="avatar">✂️</div>
    <div class="header-info">
      <div class="bot-name">Agenda tu Cita</div>
      <div class="bot-sub">Completa esto y te confirmamos por WhatsApp</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label" id="progressLabel">0 / 0</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="msg bot typing" id="typing">
      <div class="msg-av">✂️</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="chat-input" id="inputArea">
    <textarea class="input-box" id="userInput"
      placeholder="Escribe tu respuesta..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="handleUserInput()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<div class="page-footer">Hecho por Mathias — MVP en construcción</div>


<script>
/* ── HORARIO DE ATENCIÓN ─────────────────────────────────────────
   Cambia estos valores para ajustar el horario de tu negocio
   Formato 24h. diasCerrados: 0=domingo, 6=sábado
──────────────────────────────────────────────────────────────── */
const HORARIO = {
  apertura:     9,    // 9:00
  cierre:       19,   // 19:00 (última cita)
  diasCerrados: [0],  // cerrado domingos (añade 6 para sábado también)
  msgDiaCerrado: 'Lo sentimos, ese día estamos cerrados. Elige otro día (lunes a sábado).',
  msgAntesDeApertura: 'Atendemos desde las 9:00. Por favor elige un horario dentro de nuestro horario.',
  msgDespuesDeCierre: 'La última cita es a las 19:00. Por favor elige un horario anterior.',
  msgPasado: 'Ese horario ya pasó. Por favor elige una hora futura.',
};

/* ── OPCIONES DE SERVICIO ────────────────────────────────────────
   Agrega o quita opciones aquí
──────────────────────────────────────────────────────────────── */
const SERVICIOS_VALIDOS = [
  'Corte de barba',
  'Corte de pelo',
  'Corte + barba',
  'Compra de productos',
];

/* ── PASOS DEL FLUJO ─────────────────────────────────────────── */
const STEPS = [
  {
    key:      'nombre',
    pregunta: '¡Hola! 👋 Bienvenido. Para agendar tu cita, ¿cuál es tu nombre completo?',
    tipo:     'texto',
    validar(v) {
      const limpio = v.trim().replace(/\s+/g, ' ');
      if (!/^[a-záéíóúüñA-ZÁÉÍÓÚÜÑ\s'-]+$/.test(limpio))
        return 'El nombre solo puede contener letras y espacios.';
      const partes = limpio.split(' ').filter(p => p.length > 0);
      if (partes.length < 2)
        return 'Por favor ingresa tu nombre y apellido.';
      if (partes.some(p => p.length < 2))
        return 'Cada palabra del nombre debe tener al menos 2 letras.';
      /* detectar palabras repetidas: "jos jos", "aa aa" */
      const unicas = new Set(partes.map(p => p.toLowerCase()));
      if (unicas.size < partes.length)
        return 'El nombre parece contener palabras repetidas. ¿Puedes revisarlo?';
      /* detectar caracteres repetidos abusivos: "aaaa", "jjjj" */
      if (partes.some(p => /(.)\1{2,}/.test(p)))
        return 'Ese nombre no parece válido. Por favor verifica.';
      if (limpio.length > 60)
        return 'El nombre es demasiado largo.';
      return null;
    },
  },

  {
    key:      'whatsapp',
    pregunta: 'Perfecto, {nombre} 😊 ¿Cuál es tu número de WhatsApp? (incluye el código de país, ej: +51 999 888 777)',
    tipo:     'numero',
    validar(v) {
      const limpio = v.replace(/[\s\-().]/g, '');
      /* debe empezar con + o dígito */
      if (!/^[+\d]/.test(limpio))
        return 'Formato inválido. Ejemplo: +51 999 888 777';

      const digits = limpio.replace(/\D/g, '');

      /* longitud total E.164: 7-15 dígitos */
      if (digits.length < 7)  return 'El número es muy corto. Mínimo 7 dígitos.';
      if (digits.length > 15) return 'El número es muy largo. Máximo 15 dígitos.';

      /* detectar números obviamente falsos: todos iguales o secuencia */
      if (/^(\d)\1{6,}$/.test(digits))
        return 'Ese número no parece válido (dígitos repetidos).';
      if (digits === '1234567890' || digits === '0987654321' || digits === '123456789')
        return 'Por favor ingresa tu número real de WhatsApp.';

      /* si empieza con +, validar que el código de país exista */
      if (limpio.startsWith('+')) {
        /* prefijos válidos de 1-3 dígitos (lista de los más comunes + todos E.164) */
        const prefijo1 = parseInt(digits.substring(0, 1));
        const prefijo2 = parseInt(digits.substring(0, 2));
        const prefijo3 = parseInt(digits.substring(0, 3));
        const validos1 = [1];
        const validos2 = [20,27,30,31,32,33,34,36,39,40,41,43,44,45,46,47,48,49,51,52,53,54,55,56,57,58,60,61,62,63,64,65,66,81,82,84,86,90,91,92,93,94,95,98];
        const validos3 = [211,212,213,216,218,220,221,222,223,224,225,226,227,228,229,230,231,232,233,234,235,236,237,238,239,240,241,242,243,244,245,246,247,248,249,250,251,252,253,254,255,256,257,258,260,261,262,263,264,265,266,267,268,269,290,291,297,298,299,350,351,352,353,354,355,356,357,358,359,370,371,372,373,374,375,376,377,378,380,381,382,385,386,387,389,420,421,423,500,501,502,503,504,505,506,507,508,509,590,591,592,593,594,595,596,597,598,599,670,672,673,674,675,676,677,678,679,680,681,682,683,685,686,687,688,689,690,691,692,850,852,853,855,856,880,886,960,961,962,963,964,965,966,967,968,970,971,972,973,974,975,976,977,992,993,994,995,996,998];
        const codigoValido = validos1.includes(prefijo1) || validos2.includes(prefijo2) || validos3.includes(prefijo3);
        if (!codigoValido)
          return 'El código de país no parece válido. Ejemplo para Perú: +51, Colombia: +57, México: +52';
        /* longitud del número local (sin código de país) */
        const codigoLen = validos1.includes(prefijo1) ? 1 : validos2.includes(prefijo2) ? 2 : 3;
        const local = digits.substring(codigoLen);
        if (local.length < 6)
          return 'El número local es muy corto después del código de país.';
      }

      return null;
    },
  },

  {
    key:      'servicio',
    pregunta: '¿Qué servicio deseas?',
    tipo:     'opciones',
    opciones: SERVICIOS_VALIDOS,
    validar(v) {
      if (!SERVICIOS_VALIDOS.includes(v)) return 'Por favor selecciona una de las opciones disponibles.';
      return null;
    },
  },

  {
    key:      'fecha',
    pregunta: '¿Qué día prefieres para tu cita?',
    tipo:     'fecha',
    validar(v) {
      /* v ya viene en formato dd/mm/aaaa convertido por getCurrentValue */
      const [d, m, y] = v.split('/').map(Number);
      const fecha = new Date(y, m - 1, d);
      const hoy   = new Date(); hoy.setHours(0, 0, 0, 0);

      if (isNaN(fecha.getTime()))  return 'Fecha inválida. Selecciona del calendario.';
      if (fecha < hoy)             return 'No puedes agendar en una fecha pasada.';

      const diaSemana = fecha.getDay();
      if (HORARIO.diasCerrados.includes(diaSemana)) return HORARIO.msgDiaCerrado;

      /* No más de 30 días adelante */
      const limite = new Date(hoy); limite.setDate(hoy.getDate() + 30);
      if (fecha > limite)          return 'Solo puedes agendar citas con hasta 30 días de anticipación.';

      return null;
    },
  },

  {
    key:      'hora',
    pregunta: '¿A qué hora te viene bien? (atendemos de 9:00 a 19:00)',
    tipo:     'hora',
    validar(v) {
      if (!v) return 'Por favor selecciona una hora.';
      const [hh, mm] = v.split(':').map(Number);

      if (isNaN(hh) || isNaN(mm)) return 'Hora inválida.';
      if (hh < HORARIO.apertura)  return HORARIO.msgAntesDeApertura;
      if (hh > HORARIO.cierre || (hh === HORARIO.cierre && mm > 0))
        return HORARIO.msgDespuesDeCierre;
      /* solo intervalos de 15 minutos */
      if (mm % 15 !== 0)
        return 'Las citas se agendan en intervalos de 15 minutos: :00, :15, :30 o :45.';

      /* Si la fecha es hoy, verificar que la hora no haya pasado */
      if (respuestas._fechaRaw) {
        const [d, m, y] = respuestas._fechaRaw.split('-').map(Number);
        const fechaCita = new Date(y, m - 1, d);
        const hoy       = new Date(); hoy.setHours(0, 0, 0, 0);

        if (fechaCita.getTime() === hoy.getTime()) {
          const ahora = new Date();
          const citaMs = new Date();
          citaMs.setHours(hh, mm, 0, 0);
          /* Margen de 30 minutos mínimo */
          if (citaMs - ahora < 30 * 60 * 1000)
            return 'Esa hora ya pasó o está muy próxima. El mínimo es 30 minutos desde ahora.';
        }
      }

      return null;
    },
  },
];

const MENSAJE_FINAL = `¡Listo, {nombre}! 🎉 Tu cita para <strong>{servicio}</strong> está agendada para el <strong>{fecha}</strong> a las <strong>{hora}</strong>. Te confirmaremos por WhatsApp al {whatsapp}. ¡Hasta pronto! ✂️`;

const ETIQUETAS = {
  nombre:   'Nombre',
  whatsapp: 'WhatsApp',
  servicio: 'Servicio',
  fecha:    'Fecha',
  hora:     'Hora',
};

const MSG_VACIO = 'Por favor completa este campo para continuar.';

/* ── LÓGICA (no editar) ─────────────────────────────────────── */
let stepIndex = 0;
const respuestas = {};

function scrollBottom() {
  const c = document.getElementById('chatMessages');
  setTimeout(() => c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' }), 50);
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleUserInput(); }
}
function fillPlaceholders(text) {
  return text.replace(/\{(\w+)\}/g, (_, k) => respuestas[k] || '');
}
function updateProgress() {
  const total = STEPS.length;
  document.getElementById('progressLabel').textContent = `${stepIndex} / ${total}`;
  document.getElementById('progressFill').style.width = `${(stepIndex / total) * 100}%`;
}
function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function appendBotMsg(html, delay = 600, isError = false) {
  const container = document.getElementById('chatMessages');
  const typing    = document.getElementById('typing');
  typing.classList.add('active');
  scrollBottom();
  return new Promise(resolve => {
    setTimeout(() => {
      typing.classList.remove('active');
      const wrap = document.createElement('div');
      wrap.className = isError ? 'msg error' : 'msg bot';
      if (isError) {
        wrap.innerHTML = `<div class="msg-av">⚠️</div><div><div class="bubble">${html}</div></div>`;
      } else {
        wrap.innerHTML = `<div class="msg-av">✂️</div><div><div class="bubble">${html}</div></div>`;
      }
      container.insertBefore(wrap, typing);
      scrollBottom();
      resolve();
    }, delay);
  });
}

function appendUserMsg(text) {
  const container = document.getElementById('chatMessages');
  const typing    = document.getElementById('typing');
  const wrap      = document.createElement('div');
  wrap.className  = 'msg user';
  wrap.innerHTML  = `<div><div class="bubble">${escapeHtml(text)}</div></div>`;
  container.insertBefore(wrap, typing);
  scrollBottom();
}

function appendOptions(opciones) {
  const container = document.getElementById('chatMessages');
  const typing    = document.getElementById('typing');
  const row       = document.createElement('div');
  row.className   = 'options-row';
  row.id          = 'optionsRow';
  opciones.forEach(op => {
    const btn = document.createElement('button');
    btn.className   = 'opt-btn';
    btn.textContent = op;
    btn.onclick     = () => { setInputValue(op); handleUserInput(); };
    row.appendChild(btn);
  });
  container.insertBefore(row, typing);
  disableTextInput('Selecciona una opción ↑');
  document.getElementById('sendBtn').disabled = true;
  scrollBottom();
}

function removeOptions() {
  const row = document.getElementById('optionsRow');
  if (row) row.remove();
}

function removeHorarioHint() {
  const h = document.getElementById('horarioHint');
  if (h) h.remove();
}

function showNativeInput(tipo) {
  const area   = document.getElementById('inputArea');
  const oldBox = document.getElementById('userInput');
  oldBox.style.display = 'none';
  const inp = document.createElement('input');
  inp.type        = tipo === 'fecha' ? 'date' : 'time';
  inp.className   = 'input-native';
  inp.id          = 'nativeInput';
  inp.style.flex  = '1';

  if (tipo === 'fecha') {
    const hoy   = new Date();
    inp.min = hoy.toISOString().split('T')[0];
    /* máximo 30 días adelante */
    const max = new Date(hoy); max.setDate(hoy.getDate() + 30);
    inp.max = max.toISOString().split('T')[0];
  }

  if (tipo === 'hora') {
    /* Limitar al horario de atención */
    inp.min  = `${String(HORARIO.apertura).padStart(2,'0')}:00`;
    inp.max  = `${String(HORARIO.cierre).padStart(2,'0')}:00`;
    inp.step = '900'; /* intervalos de 15 min */
  }

  area.insertBefore(inp, document.getElementById('sendBtn'));
  document.getElementById('sendBtn').disabled = false;
  setTimeout(() => inp.focus(), 100);
}

function removeNativeInput() {
  const inp = document.getElementById('nativeInput');
  if (inp) inp.remove();
  document.getElementById('userInput').style.display = '';
}

function setInputValue(val) {
  document.getElementById('userInput').value = val;
}

function disableTextInput(placeholder) {
  const inp = document.getElementById('userInput');
  inp.disabled    = true;
  inp.placeholder = placeholder || 'Selecciona una opción';
}

function enableTextInput(placeholder) {
  const inp = document.getElementById('userInput');
  inp.disabled    = false;
  inp.placeholder = placeholder || 'Escribe tu respuesta...';
  setTimeout(() => inp.focus(), 100);
}

function appendSummary() {
  const container = document.getElementById('chatMessages');
  const typing    = document.getElementById('typing');
  const card      = document.createElement('div');
  card.className  = 'summary-card';
  let html = '<span class="summary-title">📋 Resumen de tu cita</span>';
  Object.entries(respuestas)
    .filter(([k]) => !k.startsWith('_'))
    .forEach(([k, v]) => {
      const label = ETIQUETAS[k] || k;
      html += `<strong>${label}:</strong> ${escapeHtml(v)}<br>`;
    });
  card.innerHTML = html;
  container.insertBefore(card, typing);
  scrollBottom();
}

function validate(step, value) {
  if (!value || !value.trim()) return step.errorMsg || MSG_VACIO;
  if (step.validar) {
    const err = step.validar(value.trim());
    if (err) return err;
  }
  return null;
}

function getCurrentValue(step) {
  if (step.tipo === 'fecha' || step.tipo === 'hora') {
    const inp = document.getElementById('nativeInput');
    if (!inp) return '';
    if (step.tipo === 'fecha') {
      const d = inp.value; /* yyyy-mm-dd */
      if (!d) return '';
      respuestas._fechaRaw = d; /* guardamos raw para validar hora luego */
      const [y, m, dy] = d.split('-');
      return `${dy}/${m}/${y}`;
    }
    return inp.value; /* hh:mm */
  }
  return document.getElementById('userInput').value.trim();
}

async function showStep(index) {
  if (index >= STEPS.length) { await finalize(); return; }
  const step = STEPS[index];
  await appendBotMsg(fillPlaceholders(step.pregunta));
  removeOptions();
  removeNativeInput();
  removeHorarioHint();
  enableTextInput();

  if (step.tipo === 'opciones') {
    appendOptions(step.opciones);
  } else if (step.tipo === 'fecha' || step.tipo === 'hora') {
    disableTextInput('Usa el selector de la derecha →');
    showNativeInput(step.tipo);
    document.getElementById('sendBtn').disabled = false;
    /* mostrar hint de horario */
    if (step.tipo === 'hora') {
      const container = document.getElementById('chatMessages');
      const typing    = document.getElementById('typing');
      const hint      = document.createElement('div');
      hint.className  = 'horario-hint';
      hint.id         = 'horarioHint';
      hint.textContent = `Horario: ${HORARIO.apertura}:00 – ${HORARIO.cierre}:00 hs · intervalos de 15 min`;
      container.insertBefore(hint, typing);
    }
  } else {
    document.getElementById('sendBtn').disabled = false;
  }

  updateProgress();
}

async function finalize() {
  document.getElementById('sendBtn').disabled = true;
  disableTextInput('Conversación finalizada');
  removeOptions();
  removeNativeInput();
  removeHorarioHint();
  appendSummary();
  await appendBotMsg(fillPlaceholders(MENSAJE_FINAL), 800);
  updateProgress();
}

async function handleUserInput() {
  if (stepIndex >= STEPS.length) return;
  const step  = STEPS[stepIndex];
  const value = getCurrentValue(step);
  const error = validate(step, value);

  if (error) {
    await appendBotMsg(escapeHtml(error), 300, true);
    if (step.tipo === 'opciones') appendOptions(step.opciones);
    return;
  }

  removeOptions();
  appendUserMsg(value);
  respuestas[step.key] = value;

  const textInput = document.getElementById('userInput');
  textInput.value = '';
  textInput.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  stepIndex++;
  await showStep(stepIndex);
}

window.addEventListener('load', () => {
  updateProgress();
  setTimeout(() => showStep(0), 600);
});
</script>
