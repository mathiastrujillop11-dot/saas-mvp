<!doctype html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendar cita | Bookeo Pro</title>
  
  <style>
      body { font-family: system-ui, Arial, sans-serif; margin: 0; padding: 0; background:#fff; }
      .wrap { max-width: 900px; margin: 0 auto; padding: 24px; }
      .card { border: 1px solid #e6e6e6; border-radius: 12px; padding: 16px; margin: 16px 0; }
      .btn { display: inline-block; padding: 12px 16px; border-radius: 10px; text-decoration: none; border: 1px solid #111; cursor:pointer; }
      .btn-primary { background: #111; color: #fff; }
      .grid { display: grid; gap: 12px; grid-template-columns: 1fr; }
      @media (min-width: 720px){ .grid { grid-template-columns: 1fr 1fr; } }
      input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ccc; }
      small { color: #666; }
      h1 { margin: 8px 0 6px; }
      h2 { margin: 0 0 10px; }
      ul { margin: 8px 0 0 18px; }
    </style>
</head>
<body>

<div class="card" id="agendar">
        <h2>Agendar cita</h2>
        <p>Completa esto y te confirmamos por WhatsApp.</p>

        <form id="appointmentForm">
          <div class="grid">
            <div>
              <label>Nombre del cliente</label>
              <input name="customerName" required placeholder="Ej: Juan Pérez" />
            </div>

            <div>
              <label>WhatsApp del cliente</label>
              <input name="customerPhone" required placeholder="Ej: 999 999 999" />
            </div>

            <div>
              <label>Servicio</label>
              <select name="service" required>
                <option value="">Elige</option>
                <option value="Corte">Corte</option>
                <option value="Barba">Barba</option>
                <option value="Corte + Barba">Corte + Barba</option>
              </select>
            </div>

            <div>
              <label>Fecha</label>
              <input type="date" name="date" required />
            </div>

            <div>
              <label>Hora</label>
              <input type="time" name="time" required />
            </div>
          </div>

          <button class="btn btn-primary" type="submit" id="appointmentBtn">Agendar</button>
          <p id="waConfirm" style="margin-top:10px;"></p>
        </form>
      </div>

      <small>Hecho por Mathias — MVP en construcción</small>
    </div>

</body>
</html>
