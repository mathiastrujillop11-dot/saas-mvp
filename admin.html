<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Citas SaaS MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <h1 style="margin:0;">Admin — Leads</h1>
      <div style="display:flex;gap:10px;align-items:center;">
        <span id="userBadge" class="pill">No logueado</span>
        <button id="logoutBtn" class="btn" style="display:none;">Salir</button>
      </div>
    </div>

    <!-- LOGIN -->
    <div id="loginCard" class="card">
      <h2 style="margin-top:0;">Ingresar</h2>

      <div class="row">
        <div>
          <label>Correo</label>
          <input id="email" type="email" placeholder="tu correo" autocomplete="email" />
        </div>
        <div>
          <label>Contraseña</label>
          <input id="password" type="password" placeholder="tu contraseña" autocomplete="current-password" />
        </div>
      </div>

      <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">
        <button id="loginBtn" class="btn primary">Entrar</button>
        <button id="signupBtn" class="btn">Crear cuenta (solo 1 vez)</button>
      </div>

      <p><small>Si ya tienes cuenta, usa solo “Entrar”.</small></p>
      <div id="loginMsg"></div>
    </div>

    <!-- DATA -->
    <div id="dataCard" class="card" style="display:none;">
      <div class="topbar">
        <div>
          <h2 style="margin:0;">Leads guardados</h2>
          <small>Se cargan desde Firestore (colección: <b>leads</b>)</small>
        </div>

        <div style="display:flex;gap:10px;align-items:center;">
          <select id="statusFilter">
            <option value="">Todos</option>
            <option value="pending">pending</option>
            <option value="contacted">contacted</option>
            <option value="closed">closed</option>
          </select>
          <button id="refreshBtn" class="btn">Actualizar</button>
        </div>
      </div>

      <div style="overflow:auto;margin-top:10px;">
        <table>
          <thead>
            <tr>
              <th>Barbería</th>
              <th>WhatsApp</th>
              <th>Citas/día</th>
              <th>Dolor</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div id="dataMsg" style="margin-top:10px;"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, collection, getDocs, query, orderBy, updateDoc, doc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHny9qz-yjnk8SzYH5z1cH75_MDs2XX5g",
      authDomain: "citas-saas-mvp.firebaseapp.com",
      projectId: "citas-saas-mvp",
      storageBucket: "citas-saas-mvp.firebasestorage.app",
      messagingSenderId: "646207057968",
      appId: "1:646207057968:web:e10fd2c87131ec0242bdf5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // UI refs
    const loginCard = document.getElementById("loginCard");
    const dataCard  = document.getElementById("dataCard");
    const rows      = document.getElementById("rows");
    const loginMsg  = document.getElementById("loginMsg");
    const dataMsg   = document.getElementById("dataMsg");
    const userBadge = document.getElementById("userBadge");
    const logoutBtn = document.getElementById("logoutBtn");

    const emailEl   = document.getElementById("email");
    const passEl    = document.getElementById("password");

    const statusFilter = document.getElementById("statusFilter");
    const refreshBtn   = document.getElementById("refreshBtn");

    let loading = false;

    function showMsg(el, text, ok = true) {
      el.innerHTML = `<p style="color:${ok ? "#8bffb0" : "#ff8b8b"};margin:10px 0 0;">${text}</p>`;
    }

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
      }[m]));
    }

    function buildWhatsAppLink(phoneRaw) {
      const phone = (phoneRaw || "").replace(/\D+/g, ""); // solo números
      if (!phone) return "#";
      // Si ya comienza con 51, no lo duplicamos
      const finalPhone = phone.startsWith("51") ? phone : ("51" + phone);
      return `https://wa.me/${finalPhone}?text=${encodeURIComponent("Hola 👋 vi tu registro para el piloto de citas. ¿Te ayudo a activarlo?")}`;
    }

    async function loadLeads() {
      if (loading) return;
      loading = true;

      rows.innerHTML = "";
      dataMsg.innerHTML = "";
      refreshBtn.disabled = true;
      refreshBtn.textContent = "Cargando...";

      try {
        const leadsRef = collection(db, "leads");

        // ✅ Esto evita el error "requires an index"
        const qy = query(leadsRef, orderBy("createdAt", "desc"));

        const snap = await getDocs(qy);

        if (snap.empty) {
          showMsg(dataMsg, "No hay leads todavía.", true);
          return;
        }

        const filter = statusFilter.value; // "" | pending | contacted | closed

        snap.forEach((d) => {
          const lead = d.data();
          const status = (lead.status || "pending");

          // filtro en frontend (sin índices)
          if (filter && status !== filter) return;

          const waLink = buildWhatsAppLink(lead.whatsapp);

          const created = lead.createdAt?.toDate ? lead.createdAt.toDate().toLocaleString() : "";

          const tr = document.createElement("tr");
          tr.dataset.id = d.id;

          tr.innerHTML = `
            <td>${esc(lead.barbershopName || "-")}</td>
            <td>${esc(lead.whatsapp || "-")}<br><small>${esc(created)}</small></td>
            <td>${esc(lead.citasPorDia || "-")}</td>
            <td>${esc(lead.dolor || "-")}</td>
            <td>
              <select class="statusSel">
                <option value="pending" ${status==="pending"?"selected":""}>pending</option>
                <option value="contacted" ${status==="contacted"?"selected":""}>contacted</option>
                <option value="closed" ${status==="closed"?"selected":""}>closed</option>
              </select>
            </td>
            <td>
              <a class="btn" target="_blank" rel="noopener" href="${waLink}">WhatsApp</a>
              <button class="btn primary saveBtn">Guardar</button>
            </td>
          `;

          rows.appendChild(tr);
        });

        if (!rows.children.length) {
          showMsg(dataMsg, "No hay leads para ese filtro.", true);
        }

      } catch (err) {
        console.error(err);
        showMsg(dataMsg, "Error cargando leads. Abre consola (F12) y manda captura.", false);
      } finally {
        loading = false;
        refreshBtn.disabled = false;
        refreshBtn.textContent = "Actualizar";
      }
    }

    // ✅ Un solo listener para toda la tabla (evita duplicados al refrescar)
    rows.addEventListener("click", async (e) => {
      const btn = e.target.closest(".saveBtn");
      if (!btn) return;

      const tr = btn.closest("tr");
      const id = tr?.dataset?.id;
      if (!id) return;

      const sel = tr.querySelector(".statusSel");
      const newStatus = sel.value;

      btn.disabled = true;
      btn.textContent = "Guardando...";

      try {
        await updateDoc(doc(db, "leads", id), { status: newStatus });
        showMsg(dataMsg, "Estado actualizado ✅", true);

        // ✅ Si hay filtro activo, y ya no cumple, lo quitamos de la tabla sin recargar
        const filter = statusFilter.value;
        if (filter && newStatus !== filter) {
          tr.remove();
        }

      } catch (err) {
        console.error(err);
        showMsg(dataMsg, "No se pudo actualizar (revisa Rules / login).", false);
      } finally {
        btn.disabled = false;
        btn.textContent = "Guardar";
      }
    });

    // LOGIN
    document.getElementById("loginBtn").addEventListener("click", async () => {
      loginMsg.innerHTML = "";
      try {
        await signInWithEmailAndPassword(auth, emailEl.value.trim(), passEl.value.trim());
      } catch (err) {
        console.error(err);
        showMsg(loginMsg, err.message, false);
      }
    });

    document.getElementById("signupBtn").addEventListener("click", async () => {
      loginMsg.innerHTML = "";
      try {
        await createUserWithEmailAndPassword(auth, emailEl.value.trim(), passEl.value.trim());
        showMsg(loginMsg, "Cuenta creada ✅ Ahora ya puedes entrar siempre.", true);
      } catch (err) {
        console.error(err);
        showMsg(loginMsg, err.message, false);
      }
    });

    logoutBtn.addEventListener("click", () => signOut(auth));

    refreshBtn.addEventListener("click", loadLeads);
    statusFilter.addEventListener("change", loadLeads);

    // AUTH STATE
    onAuthStateChanged(auth, (user) => {
      if (user) {
        userBadge.textContent = user.email;
        logoutBtn.style.display = "inline-block";
        loginCard.style.display = "none";
        dataCard.style.display = "block";
        loadLeads();
      } else {
        userBadge.textContent = "No logueado";
        logoutBtn.style.display = "none";
        loginCard.style.display = "block";
        dataCard.style.display = "none";
      }
    });
  </script>
</body>
</html>
