<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Citas SaaS MVP</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <h1 style="margin:0;">Admin — Leads</h1>
      <div style="display:flex;gap:10px;align-items:center;">
        <span id="userBadge" class="pill">No logueado</span>
        <button id="logoutBtn" class="btn" style="display:none;">Salir</button>
      </div>
    </div>

    <div id="loginCard" class="card">
      <h2 style="margin-top:0;">Ingresar</h2>

      <div class="row">
        <div>
          <label>Correo</label>
          <input id="email" type="email" placeholder="tu correo" autocomplete="email" />
        </div>
        <div>
          <label>Contraseña</label>
          <input id="password" type="password" placeholder="tu contraseña" autocomplete="current-password" />
        </div>
      </div>

      <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">
        <button id="loginBtn" class="btn primary">Entrar</button>
        <button id="resetBtn" class="btn">Olvidé mi contraseña</button>
      </div>

      <div id="loginMsg"></div>
    </div>

    <div id="dataCard" class="card" style="display:none;">
      <div class="topbar">
        <div>
          <h2 style="margin:0;">Leads guardados</h2>
          <small>colección: <b>leads</b></small>
        </div>

        <div style="display:flex;gap:10px;align-items:center;">
          <select id="statusFilter">
            <option value="pending" selected>pending</option>
            <option value="">Todos</option>
            <option value="contacted">contacted</option>
            <option value="closed">closed</option>
          </select>
          <button id="refreshBtn" class="btn">Actualizar</button>
        </div>
      </div>

      <div style="overflow:auto;margin-top:10px;">
        <table>
          <thead>
            <tr>
              <th>Barbería</th>
              <th>WhatsApp</th>
              <th>Citas/día</th>
              <th>Dolor</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div id="dataMsg" style="margin-top:10px;"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore, collection, getDocs, query, where, orderBy, updateDoc, doc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHny9qz-yjnk8SzYH5z1cH75_MDs2XX5g",
      authDomain: "citas-saas-mvp.firebaseapp.com",
      projectId: "citas-saas-mvp",
      storageBucket: "citas-saas-mvp.firebasestorage.app",
      messagingSenderId: "646207057968",
      appId: "1:646207057968:web:e10fd2c87131ec0242bdf5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const loginCard = document.getElementById("loginCard");
    const dataCard  = document.getElementById("dataCard");
    const rows      = document.getElementById("rows");
    const loginMsg  = document.getElementById("loginMsg");
    const dataMsg   = document.getElementById("dataMsg");
    const userBadge = document.getElementById("userBadge");
    const logoutBtn = document.getElementById("logoutBtn");
    const emailEl   = document.getElementById("email");
    const passEl    = document.getElementById("password");
    const statusFilter = document.getElementById("statusFilter");
    const refreshBtn   = document.getElementById("refreshBtn");

    function showMsg(el, text, ok=true){
      el.innerHTML = `<p style="color:${ok ? "#8bffb0" : "#ff8b8b"};margin:10px 0 0;">${text}</p>`;
    }

    let loading = false;

    async function loadLeads(){
      if(loading) return;
      loading = true;

      rows.innerHTML = "";
      dataMsg.innerHTML = "";
      refreshBtn.disabled = true;
      refreshBtn.textContent = "Cargando...";

      try{
        const leadsRef = collection(db, "leads");
        const st = statusFilter.value;

        let qy = query(leadsRef, orderBy("createdAt", "desc"));
        if(st){
          qy = query(leadsRef, where("status", "==", st), orderBy("createdAt", "desc"));
        }

        const snap = await getDocs(qy);

        if(snap.empty){
          showMsg(dataMsg, "No hay leads.", true);
          return;
        }

        snap.forEach((d)=>{
          const lead = d.data();
          const tr = document.createElement("tr");
          const phone = (lead.whatsapp || "").replace(/\D/g,"");
          const waLink = phone ? `https://wa.me/51${phone}?text=Hola%20👋%20vi%20tu%20registro%20para%20el%20piloto.` : "#";
          const status = lead.status || "pending";
          const created = lead.createdAt?.toDate ? lead.createdAt.toDate().toLocaleString() : "";

          tr.innerHTML = `
            <td>${lead.barbershopName || "-"}</td>
            <td>${lead.whatsapp || "-"}<br><small>${created}</small></td>
            <td>${lead.citasPorDia || "-"}</td>
            <td>${lead.dolor || "-"}</td>
            <td>
              <select data-id="${d.id}" class="statusSel">
                <option value="pending" ${status==="pending"?"selected":""}>pending</option>
                <option value="contacted" ${status==="contacted"?"selected":""}>contacted</option>
                <option value="closed" ${status==="closed"?"selected":""}>closed</option>
              </select>
            </td>
            <td>
              <a class="btn" target="_blank" rel="noopener" href="${waLink}">WhatsApp</a>
              <button class="btn primary saveBtn" data-id="${d.id}">Guardar</button>
            </td>
          `;
          rows.appendChild(tr);
        });

        document.querySelectorAll(".saveBtn").forEach(btn=>{
          btn.addEventListener("click", async ()=>{
            const id = btn.dataset.id;
            const sel = document.querySelector(`.statusSel[data-id="${id}"]`);
            const newStatus = sel.value;

            btn.disabled = true;
            const old = btn.textContent;
            btn.textContent = "Guardando...";

            try{
              await updateDoc(doc(db,"leads",id), { status:newStatus });
              showMsg(dataMsg, "Guardado ✅", true);
              await loadLeads();
            }catch(err){
              console.error(err);
              showMsg(dataMsg, "No se pudo guardar.", false);
            }finally{
              btn.disabled = false;
              btn.textContent = old;
            }
          });
        });

      }catch(err){
        console.error(err);
        showMsg(dataMsg, "Error cargando.", false);
      }finally{
        refreshBtn.disabled = false;
        refreshBtn.textContent = "Actualizar";
        loading = false;
      }
    }

    // ENTRAR
    document.getElementById("loginBtn").addEventListener("click", async ()=>{
      loginMsg.innerHTML = "";
      const email = emailEl.value.trim();
      const pass  = passEl.value;

      try{
        await signInWithEmailAndPassword(auth, email, pass);
      }catch(err){
        console.error(err);
        showMsg(loginMsg, err.message, false);
      }
    });

    // RESET PASS
    document.getElementById("resetBtn").addEventListener("click", async ()=>{
      loginMsg.innerHTML = "";
      const email = emailEl.value.trim();
      if(!email){
        showMsg(loginMsg, "Escribe tu correo primero.", false);
        return;
      }
      try{
        await sendPasswordResetEmail(auth, email);
        showMsg(loginMsg, "Te envié un correo para cambiar tu contraseña ✅", true);
      }catch(err){
        console.error(err);
        showMsg(loginMsg, err.message, false);
      }
    });

    logoutBtn.addEventListener("click", ()=>signOut(auth));
    refreshBtn.addEventListener("click", loadLeads);
    statusFilter.addEventListener("change", loadLeads);

    onAuthStateChanged(auth, (user)=>{
      if(user){
        userBadge.textContent = user.email;
        logoutBtn.style.display = "inline-block";
        loginCard.style.display = "none";
        dataCard.style.display = "block";
        loadLeads();
      }else{
        userBadge.textContent = "No logueado";
        logoutBtn.style.display = "none";
        loginCard.style.display = "block";
        dataCard.style.display = "none";
      }
    });
  </script>
</body>
</html>
